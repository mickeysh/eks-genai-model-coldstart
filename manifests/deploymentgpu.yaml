apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: genai
  labels:
    app: vllm-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      nodeSelector:
        owner: "data-engineer"
        instanceType: "gpu"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      volumes:
      - name: cache-volume
        persistentVolumeClaim:
          claimName: vllm-models
      # vLLM needs to access the host's shared memory for tensor parallel inference.
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: "8Gi"
      initContainers:
      - name: model-downloader
        image: vllm/vllm-openai:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            MODEL_ID="mistralai/Ministral-3-14B-Instruct-2512"
            CACHE_DIR="/root/.cache/huggingface/hub"
            MODEL_DIR="$CACHE_DIR/models--mistralai--Ministral-3-14B-Instruct-2512"
            if [ -d "$MODEL_DIR/snapshots" ] && [ "$(ls "$MODEL_DIR/snapshots" 2>/dev/null)" ]; then
              echo "Model already cached at $MODEL_DIR, skipping download"
            else
              echo "Model not found in cache, downloading..."
              hf download "$MODEL_ID"
            fi
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: token
        - name: HF_HUB_ENABLE_HF_TRANSFER
          value: "1"
        volumeMounts:
        - mountPath: /root/.cache/huggingface
          name: cache-volume
          subPath: huggingface
      containers:
      - name: vllm-server
        image: vllm/vllm-openai:latest
        command: ["/bin/sh", "-c"]
        args: [
          "vllm serve mistralai/Ministral-3-14B-Instruct-2512 --port 8000 --trust-remote-code --enable-chunked-prefill --max_num_batched_tokens 1024 --gpu-memory-utilization 0.95"
        ]
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: token
        - name: TRANSFORMERS_OFFLINE
          value: "1"
        - name: HF_HUB_ENABLE_HF_TRANSFER
          value: "1"
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "10"
            memory: 20G
            nvidia.com/gpu: "1"
          requests:
            cpu: "2"
            memory: 6G
            nvidia.com/gpu: "1"
        volumeMounts:
        - mountPath: /root/.cache/huggingface
          name: cache-volume
          subPath: huggingface
        - mountPath: /root/.cache/vllm
          name: cache-volume
          subPath: vllm
        - name: shm
          mountPath: /dev/shm
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-server
  namespace: genai
spec:
  ports:
  - name: http-vllm-server
    port: 80
    protocol: TCP
    targetPort: 8000
  # The label selector should match the deployment labels & it is useful for prefix caching feature
  selector:
    app: vllm-server
  sessionAffinity: None
  type: ClusterIP